<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>レシートスキャンシステム（4:3最適化）</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* カメラのガイド枠アニメーション */
    .scanner-laser {
      background: linear-gradient(to bottom, rgba(59, 130, 246, 0) 0%, rgba(59, 130, 246, 1) 50%, rgba(59, 130, 246, 0) 100%);
      animation: scan 2.5s linear infinite;
    }
    @keyframes scan {
      0% { top: 0%; }
      50% { top: 100%; }
      100% { top: 0%; }
    }
  </style>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen flex flex-col justify-between">

  <!-- 📱 メインコンテンツ -->
  <div id="main-app-content" class="flex flex-col justify-between min-h-screen">
    <!-- ヘッダー -->
    <header class="bg-blue-600 text-white shadow-md p-4 text-center">
      <h1 class="text-xl font-bold tracking-wider">景品レシート自動計算</h1>
    </header>

    <!-- メインコンテンツ -->
    <main class="flex-grow p-3 max-w-xl mx-auto w-full space-y-4">
      
      <!-- カメラセクション -->
      <section id="camera-section" class="bg-white rounded-2xl shadow-sm overflow-hidden p-2 border border-gray-100">
        <!-- 🎥 比率を縦60×横80に合わせて aspect-[4/3] に最適化 -->
        <div class="relative bg-black rounded-xl aspect-[4/3] overflow-hidden flex items-center justify-center">
          <video id="video" autoplay playsinline class="w-full h-full object-cover"></video>
          <canvas id="canvas" class="hidden"></canvas>
          
          <!-- スキャンガイド枠（レシートがぴったり収まる形状） -->
          <div class="absolute inset-x-8 inset-y-6 border-2 border-blue-400 rounded-lg pointer-events-none opacity-70">
            <div class="scanner-laser absolute left-0 w-full h-1 opacity-90"></div>
          </div>
        </div>
        
        <!-- 押しやすい大型シャッターボタン -->
        <div class="mt-3 flex justify-center px-1">
          <button id="snap-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-lg transition transform active:scale-95 text-lg tracking-wide">
            📸 レシートを撮影して計算
          </button>
        </div>
      </section>

      <!-- ローディング表示 -->
      <div id="loading" class="hidden text-center p-8 bg-white rounded-2xl shadow-sm border">
        <div class="animate-spin inline-block w-8 h-8 border-4 border-blue-600 border-t-transparent rounded-full mb-2"></div>
        <p class="text-gray-500 font-medium">Cloud Vision APIで文字解析中...</p>
      </div>

      <!-- 結果確認セクション -->
      <section id="result-section" class="hidden bg-white rounded-2xl shadow-lg border-2 border-blue-500 p-5 space-y-4">
        <div class="flex justify-between items-center border-b pb-2">
          <h2 class="text-lg font-bold text-gray-700">読み取り結果</h2>
          <span class="text-xs bg-gray-100 text-gray-500 px-2 py-1 rounded" id="res-date-now"></span>
        </div>
        <div class="grid grid-cols-2 gap-2 text-sm bg-gray-50 p-3 rounded-lg">
          <div><span class="text-gray-400">レシート日時:</span> <span id="res-receipt-date" class="font-medium"></span></div>
          <div><span class="text-gray-400">レシートNo:</span> <span id="res-receipt-num" class="font-medium text-blue-600"></span></div>
        </div>
        <table class="w-full text-left border-collapse text-sm">
          <thead>
            <tr class="border-b text-gray-400"><th class="py-1">景品種別</th><th class="py-1 text-center">個数</th><th class="py-1 text-right">金額</th></tr>
          </thead>
          <tbody class="divide-y">
            <tr><td class="py-2 font-medium">特殊景品（大）</td><td id="count-l" class="text-center font-bold text-lg">0</td><td id="price-l" class="text-right font-medium text-gray-600">¥0</td></tr>
            <tr><td class="py-2 font-medium">特殊景品（中）</td><td id="count-m" class="text-center font-bold text-lg">0</td><td id="price-m" class="text-right font-medium text-gray-600">¥0</td></tr>
            <tr><td class="py-2 font-medium">特殊景品（小）</td><td id="count-s" class="text-center font-bold text-lg">0</td><td id="price-s" class="text-right font-medium text-gray-600">¥0</td></tr>
          </tbody>
        </table>
        <div class="bg-blue-50 p-4 rounded-xl flex justify-between items-center">
          <span class="font-bold text-blue-800">合計金額</span>
          <span id="total-amount" class="text-2xl font-black text-blue-600">¥0</span>
        </div>
        <div class="flex space-x-3 pt-2">
          <button id="cancel-btn" class="w-1/3 border border-gray-300 text-gray-600 py-3 rounded-xl font-medium active:bg-gray-100">再撮影</button>
          <button id="save-btn" class="w-2/3 bg-green-600 hover:bg-green-700 text-white py-3 rounded-xl font-bold shadow-md active:scale-95 transition">DBに確定保存</button>
        </div>
      </section>

      <!-- 履歴・集計セクション -->
      <section class="bg-white rounded-2xl shadow-sm p-4 border border-gray-100 space-y-3">
        <div class="flex justify-between items-center">
          <h3 class="font-bold text-gray-700 text-sm">直近の読取履歴（最新30件）</h3>
          <button onclick="updateSummary()" class="text-xs text-blue-600 hover:underline">同期・更新</button>
        </div>
        <div id="summary-list" class="max-h-48 overflow-y-auto space-y-2 text-xs divide-y">
          <p class="text-gray-400 text-center py-4">履歴はありません</p>
        </div>
      </section>
    </main>

    <!-- フッター -->
    <footer class="text-center p-3 text-xs text-gray-400 bg-gray-100">
      &copy; 2026 Receipt Scanner App. 画像データは保持されません。
    </footer>
  </div>

  <!-- アプリ制御スクリプト -->
  <script>
    // =================================================================
    // ⚙️ 【設定エリア】環境に合わせて必ずここを書き換えてください
    // =================================================================
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbxPSoVXFzFoeBEmN9MR4UEFbLw49io0BABwP_0uJRBG2KF4-69tTEsuUbvuOVq1AfRJ/exec'; 
    const SECRET_TOKEN = 'your_super_secret_password_1234'; 
    // =================================================================

    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const snapBtn = document.getElementById('snap-btn');
    const loading = document.getElementById('loading');
    const resultSection = document.getElementById('result-section');
    const cameraSection = document.getElementById('camera-section');
    
    let currentParsedData = null;

    // 1. カメラの初期化（4:3のレシート形状を高精細で捉えられる解像度を要求）
    async function initCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { 
            facingMode: 'environment', 
            width: { ideal: 1600 }, 
            height: { ideal: 1200 } 
          },
          audio: false
        });
        video.srcObject = stream;
      } catch (err) {
        alert('カメラの起動に失敗しました。ブラウザの権限設定を確認してください: ' + err.message);
      }
    }

    // 🔑 認証トークン付き通信関数
    async function callGas(action, payloadData) {
      const response = await fetch(GAS_URL, {
        method: 'POST',
        body: JSON.stringify({ action: action, token: SECRET_TOKEN, ...payloadData }),
        headers: { 'Content-Type': 'text/plain' }
      });
      return await response.json();
    }

    // 2. シャッターボタンイベント
    snapBtn.addEventListener('click', async () => {
      const context = canvas.getContext('2d');
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      context.drawImage(video, 0, 0, canvas.width, canvas.height);
      const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
      
      cameraSection.classList.add('hidden');
      loading.classList.remove('hidden');
      resultSection.classList.add('hidden');

      try { const result = await callGas('scan', { image: dataUrl }); onSuccessOCR(result); } catch (err) { onFailure(err); }
    });

    // 3. OCR成功時の処理
    function onSuccessOCR(result) {
      loading.classList.add('hidden');
      if (!result.success) { alert('解析エラー: ' + result.error); cameraSection.classList.remove('hidden'); return; }
      currentParsedData = result.data;
      document.getElementById('res-date-now').innerText = new Date().toLocaleTimeString();
      document.getElementById('res-receipt-date').innerText = currentParsedData.receiptDate;
      document.getElementById('res-receipt-num').innerText = currentParsedData.receiptNumber;
      document.getElementById('count-l').innerText = currentParsedData.items.large.count;
      document.getElementById('price-l').innerText = '¥' + currentParsedData.items.large.amount.toLocaleString();
      document.getElementById('count-m').innerText = currentParsedData.items.medium.count;
      document.getElementById('price-m').innerText = '¥' + currentParsedData.items.medium.amount.toLocaleString();
      document.getElementById('count-s').innerText = currentParsedData.items.small.count;
      document.getElementById('price-s').innerText = '¥' + currentParsedData.items.small.amount.toLocaleString();
      document.getElementById('total-amount').innerText = '¥' + currentParsedData.totalAmount.toLocaleString();
      resultSection.classList.remove('hidden');
    }

    // 4. スプレッドシートへの確定データ転送
    document.getElementById('save-btn').addEventListener('click', async () => {
      if (!currentParsedData) return;
      document.getElementById('save-btn').disabled = true;
      document.getElementById('save-btn').innerText = '保存中...';
      try {
        const res = await callGas('save', { data: currentParsedData });
        if(res.success) { alert('データベースに保存しました。'); resetUI(); updateSummary(); } else { alert('保存失敗: ' + res.error); }
      } catch (err) { onFailure(err); }
    });

    document.getElementById('cancel-btn').addEventListener('click', () => { resetUI(); });
    function resetUI() {
      resultSection.classList.add('hidden'); cameraSection.classList.remove('hidden');
      document.getElementById('save-btn').disabled = false; document.getElementById('save-btn').innerText = 'DBに確定保存';
      currentParsedData = null;
    }
    function onFailure(err) { loading.classList.add('hidden'); alert('システムエラーが発生しました: ' + err.message); resetUI(); }

    // 5. 履歴データのリアルタイム更新
    async function updateSummary() {
      try {
        const data = await callGas('getSummary', {});
        const container = document.getElementById('summary-list');
        if (!data.rows || data.rows.length === 0) { container.innerHTML = '<p class="text-gray-400 text-center py-4">履歴はありません</p>'; return; }
        let html = '';
        data.rows.forEach(row => {
          html += `
            <div class="flex justify-between items-center py-1.5 border-b border-gray-100">
              <div>
                <div class="font-bold text-gray-700">${row.itemName} × ${row.itemCount}</div>
                <div class="text-[10px] text-gray-400">読取:${row.readDate} | No:${row.receiptNum}</div>
              </div>
              <div class="font-bold text-blue-600 text-sm">¥${row.amount.toLocaleString()}</div>
            </div>
          `;
        });
        container.innerHTML = html;
      } catch (err) { console.error("履歴の同期に失敗しました:", err); }
    }

    window.onload = () => {
      initCamera();
      updateSummary();
    };
  </script>
</body>
</html>
